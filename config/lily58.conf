# ============================================
# CONFIGURACIÓN DE BATERÍA
# ============================================
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# ============================================
# CONFIGURACIÓN DE TECLADO
# ============================================
# Debounce para evitar ghosting
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Aumentar potencia de BLE para mejor conectividad
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Nombre del teclado en Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Lily58"

# ============================================
# CONFIGURACIÓN DE ENCÓDERS (desactivado para debug)
# ============================================
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ============================================
# CONFIGURACIÓN DE POWER MANAGEMENT
# ============================================
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
