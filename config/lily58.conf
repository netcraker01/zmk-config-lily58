# ============================================
# CONFIGURACIÓN DE BATERÍA
# ============================================
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# ============================================
# CONFIGURACIÓN DE TECLADO
# ============================================
# Debounce para evitar ghosting
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Aumentar potencia de BLE para mejor conectividad
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Nombre del teclado en Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Lily58 RGB"

# ============================================
# CONFIGURACIÓN DE DISPLAY OLED
# ============================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Widgets disponibles (descomentar según preferencia)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=y

# ============================================
# CONFIGURACIÓN DE RGB UNDERGLOW (6 LEDs por lado)
# ============================================
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Apagar RGB cuando el teclado está idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Efecto inicial: 3 = Swirl (0=Sólido, 1=Respirar, 2=Espectro)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60

# ============================================
# CONFIGURACIÓN DE ENCÓDERS (si los tienes)
# ============================================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ============================================
# CONFIGURACIÓN DE POWER MANAGEMENT
# ============================================
# Timeout para idle (10 minutos)
CONFIG_ZMK_IDLE_TIMEOUT=600000

# Timeout para sleep profundo (15 minutos)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ============================================
# CONFIGURACIÓN DE ZMK STUDIO (opcional)
# ============================================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n
